# .github/workflows/dbt_ci.yml  (salesforce_dbt repo)
#
# Three job types in one workflow:
#
#   1. PR check   — slim_ci run: only models changed in the PR + their parents.
#                   Runs tests on changed models only.
#                   Uses a dedicated CI schema that is cleaned up after the run.
#
#   2. Scheduled  — full production dbt build: build + test every model.
#                   Runs hourly, ~15 minutes after the ingest Lambda so
#                   Snowpipe has time to load new files.
#
#   3. Manual     — full-refresh specific models or the whole project.
#
# Required GitHub secrets:
#   SNOWFLAKE_ACCOUNT      — xy12345.us-east-1
#   SNOWFLAKE_USER         — dbt_transformer
#   SNOWFLAKE_PASSWORD     — (or use key-pair; see note below)
#   SNOWFLAKE_ROLE         — TRANSFORMER
#   SNOWFLAKE_WAREHOUSE    — TRANSFORMING
#   SNOWFLAKE_DATABASE     — ANALYTICS
#
# For key-pair auth replace SNOWFLAKE_PASSWORD with:
#   SNOWFLAKE_PRIVATE_KEY  — RSA private key PEM (newlines as \n)
#   SNOWFLAKE_PRIVATE_KEY_PASSPHRASE — optional

name: dbt CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'snapshots/**'
      - 'seeds/**'
      - 'tests/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - '.github/workflows/dbt_ci.yml'

  pull_request:
    branches: [main]

  schedule:
    # Run 15 minutes past every hour — gives Snowpipe time to finish loading
    # after the Lambda extractor fires on the hour.
    - cron: '15 * * * *'

  workflow_dispatch:
    inputs:
      select:
        description: 'dbt --select (e.g. "tag:marts" or "fct_bookings+")'
        required: false
        default: ''
      full_refresh:
        description: 'Run with --full-refresh'
        type: boolean
        default: false
      environment:
        description: 'Target profile'
        required: true
        default: 'prod'
        type: choice
        options: [dev, prod]

env:
  DBT_VERSION:    '1.8.0'
  PYTHON_VERSION: '3.12'

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Shared setup: install dbt, resolve target profile
  # --------------------------------------------------------------------------
  setup:
    name: Resolve run parameters
    runs-on: ubuntu-latest
    outputs:
      dbt_target:    ${{ steps.params.outputs.dbt_target }}
      dbt_select:    ${{ steps.params.outputs.dbt_select }}
      full_refresh:  ${{ steps.params.outputs.full_refresh }}
      is_pr:         ${{ steps.params.outputs.is_pr }}
      is_scheduled:  ${{ steps.params.outputs.is_scheduled }}

    steps:
      - name: Resolve parameters
        id: params
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "pull_request" ]; then
            TARGET="dev"
            IS_PR="true"
            IS_SCHEDULED="false"
            SELECT="state:modified+"   # slim_ci: changed models + downstream
          elif [ "$EVENT" = "schedule" ]; then
            TARGET="prod"
            IS_PR="false"
            IS_SCHEDULED="true"
            SELECT=""
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.environment }}"
            IS_PR="false"
            IS_SCHEDULED="false"
            SELECT="${{ github.event.inputs.select }}"
          else
            TARGET="prod"
            IS_PR="false"
            IS_SCHEDULED="false"
            SELECT=""
          fi

          echo "dbt_target=$TARGET"      >> $GITHUB_OUTPUT
          echo "is_pr=$IS_PR"            >> $GITHUB_OUTPUT
          echo "is_scheduled=$IS_SCHEDULED" >> $GITHUB_OUTPUT
          echo "dbt_select=$SELECT"      >> $GITHUB_OUTPUT
          echo "full_refresh=${{ github.event.inputs.full_refresh || 'false' }}" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # SQL linting (sqlfluff) — runs on all triggers
  # --------------------------------------------------------------------------
  lint:
    name: SQL lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salesforce_dbt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install sqlfluff
        run: pip install sqlfluff sqlfluff-templater-dbt dbt-snowflake==${{ env.DBT_VERSION }}

      - name: Lint SQL
        run: |
          sqlfluff lint models/ macros/ snapshots/ \
            --dialect snowflake \
            --templater dbt \
            --exclude-rules L016,L036   # line length, select wildcards
        continue-on-error: true   # lint failures warn but don't block deploys

  # --------------------------------------------------------------------------
  # PR: slim CI — only build + test changed models
  # --------------------------------------------------------------------------
  slim_ci:
    name: Slim CI (changed models only)
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.is_pr == 'true'
    environment: dev
    defaults:
      run:
        working-directory: salesforce_dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake==${{ env.DBT_VERSION }}

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          salesforce_dbt:
            target: dev
            outputs:
              dev:
                type:      snowflake
                account:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user:      ${{ secrets.SNOWFLAKE_USER }}
                password:  ${{ secrets.SNOWFLAKE_PASSWORD }}
                role:      TRANSFORMER_DEV
                database:  ANALYTICS_DEV
                warehouse: TRANSFORMING_DEV
                schema:    "dbt_ci_${{ github.event.number }}"
                threads:   4
                query_tag: "dbt_ci_pr_${{ github.event.number }}"
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt seed (reference data only)
        run: dbt seed --select salesforce_stage_order bookings_targets

      - name: dbt build (changed models + downstream)
        run: |
          dbt build \
            --select "${{ needs.setup.outputs.dbt_select }}" \
            --defer \
            --state ./target \
            --target dev
        env:
          DBT_TARGET: dev

      - name: Upload manifest for state comparison
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-manifest-pr-${{ github.event.number }}
          path: target/manifest.json
          retention-days: 7

      - name: Cleanup CI schema
        if: always()
        run: |
          dbt run-operation grant_all_schemas_to_role \
            --args '{"role": "TRANSFORMER_DEV"}'
        # In prod you would run a "drop schema" operation here
        # using a dbt macro or direct Snowflake connection

  # --------------------------------------------------------------------------
  # Scheduled / main push: full production build
  # --------------------------------------------------------------------------
  full_build:
    name: Full dbt build (${{ needs.setup.outputs.dbt_target }})
    runs-on: ubuntu-latest
    needs: [setup, lint]
    if: needs.setup.outputs.is_pr == 'false'
    environment: ${{ needs.setup.outputs.dbt_target }}
    defaults:
      run:
        working-directory: salesforce_dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake==${{ env.DBT_VERSION }}

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          salesforce_dbt:
            target: ${{ needs.setup.outputs.dbt_target }}
            outputs:
              prod:
                type:      snowflake
                account:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user:      ${{ secrets.SNOWFLAKE_USER }}
                password:  ${{ secrets.SNOWFLAKE_PASSWORD }}
                role:      TRANSFORMER
                database:  ANALYTICS
                warehouse: TRANSFORMING
                schema:    dbt_prod
                threads:   8
                query_tag: "dbt_scheduled_${{ github.run_id }}"
              dev:
                type:      snowflake
                account:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user:      ${{ secrets.SNOWFLAKE_USER }}
                password:  ${{ secrets.SNOWFLAKE_PASSWORD }}
                role:      TRANSFORMER_DEV
                database:  ANALYTICS_DEV
                warehouse: TRANSFORMING_DEV
                schema:    dbt_dev
                threads:   4
                query_tag: "dbt_dev_${{ github.run_id }}"
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt source freshness
        run: dbt source freshness
        continue-on-error: true   # freshness alerts go to CloudWatch; don't block

      - name: dbt seed
        run: dbt seed

      - name: dbt snapshot (SCD2 — must run before marts)
        run: dbt snapshot

      - name: dbt run
        run: |
          ARGS="--target ${{ needs.setup.outputs.dbt_target }}"
          if [ "${{ needs.setup.outputs.full_refresh }}" = "true" ]; then
            ARGS="$ARGS --full-refresh"
          fi
          if [ -n "${{ needs.setup.outputs.dbt_select }}" ]; then
            ARGS="$ARGS --select ${{ needs.setup.outputs.dbt_select }}"
          fi
          dbt run $ARGS

      - name: dbt test
        run: |
          ARGS=""
          if [ -n "${{ needs.setup.outputs.dbt_select }}" ]; then
            ARGS="--select ${{ needs.setup.outputs.dbt_select }}"
          fi
          dbt test $ARGS

      - name: dbt docs generate
        run: dbt docs generate
        if: needs.setup.outputs.dbt_target == 'prod'

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 30

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ dbt build failed on *${{ needs.setup.outputs.dbt_target }}*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Workflow", "value": "${{ github.workflow }}", "short": true},
                  {"title": "Run",      "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
